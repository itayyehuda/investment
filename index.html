<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investment Comparison</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e1117;
    --bg2: #161b27;
    --bg3: #1e2537;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.15);
    --text: #e8eaf0;
    --text-dim: #7a8099;
    --text-dimmer: #454d66;
    --accent: #f0c040;
    --accent2: #3de8c8;
    --danger: #ff5e6d;
    --radius: 10px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    padding: 22px 32px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 16px;
  }
  header h1 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.06em;
    color: var(--accent);
    text-transform: uppercase;
  }
  header span {
    font-size: 13px;
    color: var(--text-dim);
  }

  /* ── Main layout ── */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 24px 28px;
    gap: 24px;
  }

  /* ── Chart container ── */
  .chart-wrap {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 24px 20px;
    position: relative;
  }

  .chart-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .chart-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .time-control {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .time-control label {
    font-size: 12px;
    color: var(--text-dim);
    font-family: 'IBM Plex Mono', monospace;
  }
  .time-control input[type=range] {
    -webkit-appearance: none;
    width: 160px;
    height: 3px;
    background: var(--bg3);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  .time-control input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: 2px solid var(--bg);
  }
  .time-control .years-val {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    font-weight: 600;
    min-width: 40px;
  }

  canvas { width: 100% !important; }

  /* ── Investment cards ── */
  .cards-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .cards-header h2 {
    font-size: 12px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--text-dim);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .btn-add {
    display: flex;
    align-items: center;
    gap: 7px;
    background: transparent;
    border: 1px solid var(--border-hover);
    color: var(--text);
    padding: 8px 16px;
    border-radius: 7px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-add:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(240,192,64,0.05);
  }
  .btn-add svg { width:14px; height:14px; }

  /* ── Cards grid ── */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 16px;
  }

  /* ── Single card ── */
  .inv-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.15s;
    position: relative;
  }
  .inv-card:hover { border-color: var(--border-hover); }
  .inv-card.disabled { opacity: 0.45; }

  .card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 13px 16px 11px;
    border-bottom: 1px solid var(--border);
  }

  .color-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
    cursor: pointer;
    position: relative;
  }
  .color-dot input[type=color] {
    opacity: 0;
    position: absolute;
    inset: -4px;
    width: 18px; height: 18px;
    cursor: pointer;
    border: none;
    padding: 0;
  }

  .card-name-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
  }
  .card-name-input::placeholder { color: var(--text-dimmer); }

  .card-actions {
    display: flex;
    gap: 4px;
  }
  .card-btn {
    background: transparent;
    border: none;
    cursor: pointer;
    padding: 4px 6px;
    border-radius: 5px;
    transition: background 0.12s;
    line-height: 0;
  }
  .card-btn:hover { background: rgba(255,255,255,0.07); }
  .card-btn svg { width:14px; height:14px; color: var(--text-dim); display:block; }
  .card-btn.del:hover svg { color: var(--danger); }
  .card-btn.vis svg { color: var(--text-dim); }
  .card-btn.vis.hidden svg { color: var(--text-dimmer); }

  .card-body {
    padding: 14px 16px 16px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px 14px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .field label {
    font-size: 10px;
    color: var(--text-dimmer);
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .field-input-wrap {
    display: flex;
    align-items: center;
    background: var(--bg3);
    border: 1px solid transparent;
    border-radius: 6px;
    overflow: hidden;
    transition: border-color 0.12s;
  }
  .field-input-wrap:focus-within {
    border-color: rgba(240,192,64,0.4);
  }
  .field-input-wrap input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    padding: 6px 8px;
    width: 100%;
  }
  .field-input-wrap input::-webkit-inner-spin-button,
  .field-input-wrap input::-webkit-outer-spin-button { -webkit-appearance: none; }
  .field-unit {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-dimmer);
    padding: 0 7px 0 0;
    white-space: nowrap;
  }

  /* ── Net value badge ── */
  .card-footer {
    border-top: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .net-label {
    font-size: 11px;
    color: var(--text-dimmer);
    font-family: 'IBM Plex Mono', monospace;
  }
  .net-value {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    color: var(--accent2);
  }
  .net-value.depleted { color: var(--danger); }

  /* ── Empty state ── */
  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 40px;
    color: var(--text-dimmer);
    font-size: 14px;
  }

  /* ── Tooltip customization via chart.js ── */
  .chartjs-tooltip {
    background: var(--bg3) !important;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }

  @media (max-width: 600px) {
    .card-body { grid-template-columns: 1fr 1fr; }
    header { padding: 16px; }
    main { padding: 16px; }
  }
</style>
</head>
<body>

<header>
  <h1>Investment Planner</h1>
  <span>Net withdrawal value over time — all figures in real terms</span>
</header>

<main>
  <!-- Chart -->
  <div class="chart-wrap">
    <div class="chart-toolbar">
      <span class="chart-title">Net Portfolio Value (after Capital Gains Tax)</span>
      <div class="time-control">
        <label>HORIZON</label>
        <input type="range" id="yearsSlider" min="5" max="100" value="30" step="1">
        <span class="years-val" id="yearsVal">30 yrs</span>
      </div>
    </div>
    <canvas id="chart" height="340"></canvas>
  </div>

  <!-- Cards section -->
  <div class="cards-header">
    <h2>Investments</h2>
    <button class="btn-add" id="btnAdd">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/>
      </svg>
      Add Investment
    </button>
  </div>

  <div class="cards-grid" id="cardsGrid"></div>
</main>

<script>
/* ──────────────────────────────────────────────────────────
   STATE
────────────────────────────────────────────────────────── */
let nextId = 0;
let investments = [];
let years = 30;

const COLORS = [
  '#f0c040', '#3de8c8', '#ff6b8a', '#7b9fff', '#ff9a5c',
  '#b07fff', '#52e077', '#ff5e6d', '#40c4ff', '#ffd166'
];

const DEFAULT_PARAMS = {
  initial: 100000,
  annualReturn: 7,
  monthlyWithdrawal: 0,
  annualFee: 1,
  capitalGainTax: 25,
  annualInflation: 2.5,
  monthlyDeposit: 0,
};

/* ──────────────────────────────────────────────────────────
   SIMULATION
   P = principal remaining, G = gains
   Each month:
     1. Growth goes to G
     2. Management fee reduces P and G proportionally
     3. Inflation-adjusted withdrawal, split by P/G ratio
        (CGT only on the gains portion of withdrawal)
   Net value = P + G × (1 − CGT)
────────────────────────────────────────────────────────── */
function simulate(inv, totalYears) {
  const r = Math.pow(1 + inv.annualReturn / 100, 1.0 / 12) - 1;
  const f = Math.pow(1 + inv.annualFee / 100, 1.0 / 12) - 1;
  const cgt = inv.capitalGainTax / 100;
  const inf = Math.pow(1 + inv.annualInflation / 100, 1.0 / 12) - 1;

  let dep = inv.monthlyDeposit;
  let P = inv.initial;
  let G = 0;

  // Year 0: no gains yet, full initial value
  const pts = [{ x: 0, y: P }];
  let depleted = false;

  for (let m = 1; m <= totalYears * 12; m++) {
    if (depleted) {
      if (m % 12 === 0) pts.push({ x: m / 12, y: 0 });
      continue;
    }

    // 1. Growth
    G += (P + G) * r;

    diff = inf * P
    P += diff
    G -= diff

    P += dep;
    dep += inf * dep;

    // 2. Management fee (proportional)
    const fMult = 1 - f;
    sub = f * (P + G)
    G -= sub
    if (G < 0) {
      P += G
      G = 0
    }

    // 3. Inflation-adjusted withdrawal (net, i.e. what the investor receives)
    const W_net = inv.monthlyWithdrawal * Math.pow(1 + inf, m - 1); // month 1 = no inflation adjustment yet
    const total = P + G;

    if (total <= 1e-6) {
      depleted = true;
      if (m % 12 === 0) pts.push({ x: m / 12, y: 0 });
      continue;
    }

    const ratioG = G / total; // fraction of total that is gains

    // To net W_net after CGT on the gains portion:
    // W_gross × [ratioG×(1−cgt) + (1−ratioG)] = W_net
    // W_gross × [1 − ratioG×cgt] = W_net
    const denom = 1 - ratioG * cgt;
    const W_gross = (denom > 0) ? W_net / denom : W_net;

    if (W_gross >= total) {
      depleted = true;
      if (m % 12 === 0) pts.push({ x: m / 12, y: 0 });
      continue;
    }

    P -= W_gross * (1 - ratioG);
    G -= W_gross * ratioG;

    // Safety clamps (floating point)
    if (P < 0) { G += P; P = 0; }
    if (G < 0) { P += G; G = 0; }

    // Record at year boundaries
    if (m % 12 === 0) {
      const netVal = Math.max(0, P + G * (1 - cgt));
      pts.push({ x: m / 12, y: netVal });
    }
  }

  return { points: pts, depleted };
}

/* ──────────────────────────────────────────────────────────
   CHART
────────────────────────────────────────────────────────── */
const ctx = document.getElementById('chart').getContext('2d');
const chart = new Chart(ctx, {
  type: 'line',
  data: { datasets: [] },
  options: {
    responsive: true,
    animation: { duration: 280, easing: 'easeOutQuart' },
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: {
        display: true,
        position: 'top',
        labels: {
          color: '#7a8099',
          font: { family: 'IBM Plex Mono', size: 11 },
          usePointStyle: true,
          pointStyleWidth: 10,
          boxHeight: 6,
          padding: 20,
        }
      },
      tooltip: {
        backgroundColor: '#1e2537',
        titleColor: '#7a8099',
        bodyColor: '#e8eaf0',
        borderColor: 'rgba(255,255,255,0.08)',
        borderWidth: 1,
        titleFont: { family: 'IBM Plex Mono', size: 11 },
        bodyFont: { family: 'IBM Plex Mono', size: 12 },
        padding: 12,
        callbacks: {
          title: items => `Year ${items[0].parsed.x}`,
          label: item => {
            const v = item.parsed.y;
            if (v === 0) return ` ${item.dataset.label}: Depleted`;
            return ` ${item.dataset.label}: ${fmt(v)}`;
          }
        }
      }
    },
    scales: {
      x: {
        type: 'linear',
        title: {
          display: true,
          text: 'Years',
          color: '#454d66',
          font: { family: 'IBM Plex Mono', size: 10 }
        },
        ticks: {
          color: '#454d66',
          font: { family: 'IBM Plex Mono', size: 10 },
          stepSize: 5,
        },
        grid: { color: 'rgba(255,255,255,0.04)' },
        border: { color: 'rgba(255,255,255,0.07)' },
        min: 0,
      },
      y: {
        title: {
          display: true,
          text: 'Net Value',
          color: '#454d66',
          font: { family: 'IBM Plex Mono', size: 10 }
        },
        ticks: {
          color: '#454d66',
          font: { family: 'IBM Plex Mono', size: 10 },
          callback: v => fmtShort(v),
        },
        grid: { color: 'rgba(255,255,255,0.04)' },
        border: { color: 'rgba(255,255,255,0.07)' },
        beginAtZero: true,
      }
    }
  }
});

function fmt(n) {
  if (n === 0) return '—';
  return new Intl.NumberFormat('en-US', {
    style: 'currency', currency: 'USD',
    minimumFractionDigits: 0, maximumFractionDigits: 0
  }).format(n);
}

function fmtShort(n) {
  if (n >= 1e9) return '$' + (n/1e9).toFixed(1) + 'B';
  if (n >= 1e6) return '$' + (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return '$' + (n/1e3).toFixed(0) + 'K';
  return '$' + n.toFixed(0);
}

function rebuildChart() {
  chart.data.datasets = investments
    .filter(inv => inv.visible)
    .map(inv => {
      const { points, depleted } = simulate(inv, years);
      return {
        label: inv.name || 'Investment',
        data: points,
        borderColor: inv.color,
        backgroundColor: inv.color + '18',
        borderWidth: 2,
        pointRadius: 0,
        pointHoverRadius: 5,
        pointHoverBackgroundColor: inv.color,
        tension: 0.35,
        fill: false,
      };
    });
  chart.options.scales.x.max = years;
  chart.update();

  // Update net value badges
  investments.forEach(inv => {
    const card = document.getElementById(`card-${inv.id}`);
    if (!card) return;
    const badge = card.querySelector('.net-value');
    if (!badge) return;
    const { points, depleted } = simulate(inv, years);
    const last = points[points.length - 1];
    if (depleted || !last || last.y === 0) {
      badge.textContent = 'Depleted';
      badge.className = 'net-value depleted';
    } else {
      badge.textContent = fmt(last.y);
      badge.className = 'net-value';
    }
  });
}

/* ──────────────────────────────────────────────────────────
   CARD CREATION
────────────────────────────────────────────────────────── */
function createInvestment(overrides = {}) {
  const id = nextId++;
  const colorIndex = investments.length % COLORS.length;
  const inv = {
    id,
    name: `Investment ${id + 1}`,
    color: COLORS[colorIndex],
    visible: true,
    ...DEFAULT_PARAMS,
    ...overrides
  };
  investments.push(inv);
  renderCard(inv);
  rebuildChart();
}

function renderCard(inv) {
  const grid = document.getElementById('cardsGrid');
  const empty = grid.querySelector('.empty-state');
  if (empty) empty.remove();

  const card = document.createElement('div');
  card.className = 'inv-card';
  card.id = `card-${inv.id}`;
  card.innerHTML = `
    <div class="card-header">
      <div class="color-dot" style="background:${inv.color}" title="Click to change color">
        <input type="color" value="${inv.color}" data-field="color">
      </div>
      <input class="card-name-input" type="text" value="${inv.name}" placeholder="Name" data-field="name">
      <div class="card-actions">
        <button class="card-btn vis ${inv.visible ? '' : 'hidden'}" title="Toggle visibility">
          ${eyeIcon(inv.visible)}
        </button>
        <button class="card-btn del" title="Remove">
          ${trashIcon()}
        </button>
      </div>
    </div>
    <div class="card-body">
      ${field('INITIAL', 'initial', inv.initial, '$')}
      ${field('ANNUAL RETURN', 'annualReturn', inv.annualReturn, '%')}
      ${field('MONTHLY WITHDRAW', 'monthlyWithdrawal', inv.monthlyWithdrawal, '$')}
      ${field('MGMT FEE / YR', 'annualFee', inv.annualFee, '%')}
      ${field('CAPITAL GAIN TAX', 'capitalGainTax', inv.capitalGainTax, '%')}
      ${field('INFLATION / YR', 'annualInflation', inv.annualInflation, '%')}
      ${field('MONTHLY DEPOSIT', 'monthlyDeposit', inv.monthlyDeposit, '$')}
    </div>
    <div class="card-footer">
      <span class="net-label">NET VALUE @ YR ${years}</span>
      <span class="net-value">—</span>
    </div>
  `;

  // Wire up events
  card.querySelectorAll('input[data-field]').forEach(input => {
    const handler = () => {
      const field = input.dataset.field;
      if (field === 'name') {
        inv.name = input.value;
      } else if (field === 'color') {
        inv.color = input.value;
        card.querySelector('.color-dot').style.background = input.value;
      } else {
        const val = parseFloat(input.value);
        if (!isNaN(val) && val >= 0) inv[field] = val;
      }
      rebuildChart();
    };
    input.addEventListener('input', handler);
  });

  card.querySelector('.card-btn.vis').addEventListener('click', () => {
    inv.visible = !inv.visible;
    const btn = card.querySelector('.card-btn.vis');
    btn.innerHTML = eyeIcon(inv.visible);
    btn.classList.toggle('hidden', !inv.visible);
    card.classList.toggle('disabled', !inv.visible);
    rebuildChart();
  });

  card.querySelector('.card-btn.del').addEventListener('click', () => {
    investments = investments.filter(i => i.id !== inv.id);
    card.remove();
    if (investments.length === 0) showEmpty();
    rebuildChart();
  });

  grid.appendChild(card);

  // Animate in
  card.style.opacity = '0';
  card.style.transform = 'translateY(10px)';
  requestAnimationFrame(() => {
    card.style.transition = 'opacity 0.25s, transform 0.25s';
    card.style.opacity = '';
    card.style.transform = '';
  });
}

function field(label, key, value, unit) {
  const step = (unit === '%') ? '0.1' : '100';
  const min = '0';
  return `
    <div class="field">
      <label>${label}</label>
      <div class="field-input-wrap">
        <input type="number" value="${value}" min="${min}" step="${step}" data-field="${key}">
        <span class="field-unit">${unit}</span>
      </div>
    </div>`;
}

function showEmpty() {
  const grid = document.getElementById('cardsGrid');
  const div = document.createElement('div');
  div.className = 'empty-state';
  div.textContent = 'No investments yet — add one above to get started.';
  grid.appendChild(div);
}

function eyeIcon(visible) {
  if (visible) return `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
    <path d="M1 8s2.5-5 7-5 7 5 7 5-2.5 5-7 5-7-5-7-5z"/>
    <circle cx="8" cy="8" r="2"/>
  </svg>`;
  return `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
    <path d="M2 2l12 12M6.5 6.6A2 2 0 0 0 9.4 9.5M4.1 4.2C2.7 5.2 1.5 7 1.5 8s2 5 6.5 5c1.5 0 2.8-.4 3.9-1.1M7 3.1C7.3 3 7.7 3 8 3c4.5 0 6.5 5 6.5 5a10 10 0 0 1-1.6 2.3"/>
  </svg>`;
}

function trashIcon() {
  return `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
    <path d="M2 4h12M5 4V2h6v2M6 7v5M10 7v5M3 4l1 9h8l1-9"/>
  </svg>`;
}

/* ──────────────────────────────────────────────────────────
   CONTROLS
────────────────────────────────────────────────────────── */
document.getElementById('btnAdd').addEventListener('click', () => createInvestment());

const slider = document.getElementById('yearsSlider');
const yearsVal = document.getElementById('yearsVal');
slider.addEventListener('input', () => {
  years = parseInt(slider.value);
  yearsVal.textContent = `${years} yrs`;
  // Update footer labels
  document.querySelectorAll('.net-label').forEach(el => {
    el.textContent = `NET VALUE @ YR ${years}`;
  });
  rebuildChart();
});
